name: "Chromatic"

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      project_token:
        description: "Chromatic project token (empty uses secrets.CHROMATIC_PROJECT_TOKEN)"
        required: false
        type: string
      chromatic_index_url:
        description: "Chromatic index URL (empty uses default staging index)"
        required: false
        default: "https://index.staging-chromatic.com"

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Output git info
        run: |
          if [ -n "${{ github.event.merge_group }}" ]; then
            echo "================================================"
            echo "  MERGE QUEUE - MERGE STRATEGY DETAILS"
            echo "================================================"
            echo ""
            echo "  This branch being merged:"
            echo "    Branch : ${{ github.event.merge_group.head_ref }}"
            echo "    Commit : ${{ github.event.merge_group.head_sha }}"
            echo ""
            echo "  Merging into:"
            echo "    Branch : ${{ github.event.merge_group.base_ref }}"
            echo "    Commit : ${{ github.event.merge_group.base_sha }}"
            echo ""
            echo "  Full commit details:"
            echo "    Commit ID : ${{ github.event.merge_group.head_commit.id }}"
            echo "    Tree ID   : ${{ github.event.merge_group.head_commit.tree_id }}"
            echo "================================================"
          else
            echo "  [INFO] Not a merge queue event - git info skipped."
          fi
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
      - name: Install dependencies
        run: npm ci
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ github.event.inputs.project_token || secrets.CHROMATIC_PROJECT_TOKEN }}
          debug: true
        env:
          CHROMATIC_INDEX_URL: ${{ github.event.inputs.chromatic_index_url || 'https://index.staging-chromatic.com' }}
